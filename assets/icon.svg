<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d14"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="32" y="32" width="960" height="960" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="32" y="32" width="960" height="960" rx="220" ry="220" fill="none" stroke="rgba(167,139,250,0.15)" stroke-width="3"/>

  <!-- Terminal prompt > -->
  <text x="300" y="580" font-family="SF Mono, Menlo, monospace" font-size="380" font-weight="700" fill="#a78bfa" filter="url(#glow)">&#x3E;_</text>
</svg>
