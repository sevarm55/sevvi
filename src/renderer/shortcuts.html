<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sevvi Shortcuts</title>
  <link rel="stylesheet" href="styles/terminal.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #16161a; color: #e8e8ef; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; height: 100%; }
    #drag-bar { height: 38px; -webkit-app-region: drag; display: flex; align-items: center; justify-content: center; }
    #content { height: calc(100% - 38px); overflow-y: auto; padding: 0 28px 28px; }
    #content::-webkit-scrollbar { width: 6px; }
    #content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="drag-bar"></div>
  <div id="content">
    <h2 class="shortcuts-title">SHORTCUTS</h2>
    <div class="shortcuts-grid">
      <div class="shortcut-group">
        <h3>Sessions</h3>
        <div class="shortcut-row"><span>New Tab</span><div class="keys"><kbd>&#x2318;</kbd><kbd>T</kbd></div></div>
        <div class="shortcut-row"><span>Close Tab</span><div class="keys"><kbd>&#x2318;</kbd><kbd>W</kbd></div></div>
        <div class="shortcut-row"><span>Next Tab</span><div class="keys"><kbd>&#x2318;</kbd><kbd>&#x21E7;</kbd><kbd>]</kbd></div></div>
        <div class="shortcut-row"><span>Previous Tab</span><div class="keys"><kbd>&#x2318;</kbd><kbd>&#x21E7;</kbd><kbd>[</kbd></div></div>
      </div>
      <div class="shortcut-group">
        <h3>Panes</h3>
        <div class="shortcut-row"><span>Split Horizontal</span><div class="keys"><kbd>&#x2318;</kbd><kbd>D</kbd></div></div>
        <div class="shortcut-row"><span>Split Vertical</span><div class="keys"><kbd>&#x2318;</kbd><kbd>&#x21E7;</kbd><kbd>D</kbd></div></div>
        <div class="shortcut-row"><span>Navigate Panes</span><div class="keys"><kbd>&#x2318;</kbd><kbd>&#x2325;</kbd><kbd>&#x2190;&#x2191;&#x2192;&#x2193;</kbd></div></div>
        <div class="shortcut-row"><span>Next Pane</span><div class="keys"><kbd>&#x2318;</kbd><kbd>&#x2325;</kbd><kbd>N</kbd></div></div>
      </div>
      <div class="shortcut-group">
        <h3>Window</h3>
        <div class="shortcut-row"><span>Toggle Sidebar</span><div class="keys"><kbd>&#x2318;</kbd><kbd>B</kbd></div></div>
        <div class="shortcut-row"><span>Settings</span><div class="keys"><kbd>&#x2318;</kbd><kbd>,</kbd></div></div>
        <div class="shortcut-row"><span>Command Palette</span><div class="keys"><kbd>&#x2318;</kbd><kbd>P</kbd></div></div>
        <div class="shortcut-row"><span>Shortcuts</span><div class="keys"><kbd>&#x2318;</kbd><kbd>/</kbd></div></div>
      </div>
      <div class="shortcut-group">
        <h3>Zoom</h3>
        <div class="shortcut-row"><span>Zoom In</span><div class="keys"><kbd>&#x2318;</kbd><kbd>=</kbd></div></div>
        <div class="shortcut-row"><span>Zoom Out</span><div class="keys"><kbd>&#x2318;</kbd><kbd>-</kbd></div></div>
        <div class="shortcut-row"><span>Reset Zoom</span><div class="keys"><kbd>&#x2318;</kbd><kbd>0</kbd></div></div>
      </div>
    </div>
  </div>
</body>
</html>
